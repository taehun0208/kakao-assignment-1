<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="app-header">
      <h1 class="app-title">Todo</h1>
    </header>

    <!-- 주간 뷰 -->
    <div class="week-navigator">
      <div class="week-nav-header">
        <button type="button" class="btn-week-nav" id="btnPrevWeek" aria-label="이전 주">&#8249;</button>
        <span class="week-range" id="weekRange"></span>
        <button type="button" class="btn-week-nav" id="btnNextWeek" aria-label="다음 주">&#8250;</button>
      </div>
      <div class="week-days" id="weekDays"></div>
    </div>

    <nav class="filter-tabs">
      <button type="button" class="tab active" data-filter="all">전체</button>
      <button type="button" class="tab" data-filter="active">진행 중</button>
      <button type="button" class="tab" data-filter="completed">완료</button>
    </nav>

    <!-- Todo 입력 -->
    <div class="input-area">
      <input
        type="text"
        id="todoInput"
        class="todo-input"
        placeholder="할 일을 입력하세요"
        autocomplete="off"
      />
      <button type="button" class="btn-add" id="btnAdd">추가</button>
    </div>
    <p class="input-error hidden" id="inputError">할 일을 입력해주세요.</p>

    <!-- Todo 목록 -->
    <ul class="todo-list" id="todoList"></ul>

    <!-- 빈 상태 안내 -->
    <p class="empty-message hidden" id="emptyMessage">할 일이 없어요 ☀️</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
